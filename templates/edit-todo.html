{% include 'layout.html' %}

<div class="container">
  <div class="card">
    <div class="card-header">
      Let's edit your todo!
    </div>
    <div class="card-body">
      <form id="editTodoForm">
        <div class="form-group">
          <label>Titulo</label>
          <input type="text" class="form-control" name="titulo" value="{{todo.titulo}}" required>
        </div>
        <div class="form-group">
          <label>descripción</label>
          <textarea name="descripcion" class="form-control" rows="3" required>{{todo.descripcion}}</textarea>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select name="prioridad" class="form-control">
            <option {% if todo.prioridad == 1 %} selected="selected" {% endif %}>1</option>
            <option {% if todo.prioridad == 2 %} selected="selected" {% endif %}>2</option>
            <option {% if todo.prioridad == 3 %} selected="selected" {% endif %}>3</option>
            <option {% if todo.prioridad == 4 %} selected="selected" {% endif %}>4</option>
            <option {% if todo.prioridad == 5 %} selected="selected" {% endif %}>5</option>
          </select>
        </div>
        <div class="form-group form-check">
          <input type="checkbox" class="form-check-input" name="completada" {% if todo.completada %} checked {% endif %}>
          <label class="form-check-label">Completada</label>
        </div>
        <button type="submit" class="btn btn-primary">Editar</button>
        <button id="deleteButton" type="button" class="btn btn-danger">Borrar</button>
        <a href="/todos/todo-page" class="btn btn-success">Back</a>
      </form>
    </div>
  </div>
</div>
