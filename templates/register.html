{% include 'layout.html' %}

<div class="container">
<div class="card">
    <div class="card-header">
        Register
    </div>
    <div class="card-body">
        <form id="registerForm">
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label>Email</label>
                    <input type="text" class="form-control" name="email" required>
                </div>
                <div class="form-group col-md-6">
                    <label>Nombre de usuario</label>
                    <input type="text" class="form-control" name="nombre_usu" required>
                </div>
                <div class="form-group col-md-6">
                    <label>Nombre</label>
                    <input type="text" class="form-control" name="nombre" required>
                </div>
                <div class="form-group col-md-6">
                    <label>Apellido</label>
                    <input type="text" class="form-control" name="apellido" required>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Rol</label>
                        <input type="text" class="form-control" name="rol" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label>tel</label>
                        <input type="text" class="form-control" name="tel" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" class="form-control" name="password" autocomplete="new-password" required>
                </div>
                <div class="form-group">
                    <label>Verificar Contraseña</label>
                    <input type="password" class="form-control" name="password2" autocomplete="new-password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Registrarse</button>
        </form>
    </div>
    <div class="card-footer text-muted">
        <a href="/auth/login-page">¿Ya tienes una cuenta?</a>
    </div>
</div>
</div>
